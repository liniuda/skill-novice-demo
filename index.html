<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>智服工坊 · CCO Skill Studio</title>
  <link rel="stylesheet" href="css/main.css?v=7">
</head>
<body>

  <!-- 全局顶部 Tab 栏 -->
  <header class="global-topbar">
    <div class="global-topbar-logo">
      <!-- CCO Skill Studio logo：闪电 + 圆环，象征 AI 智能客服 -->
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="10" cy="10" r="9" stroke="white" stroke-width="1.6" fill="none" opacity="0.7"/>
        <path d="M11.5 2.5L7 10.5H10.5L8.5 17.5L14 9H10.5L11.5 2.5Z" fill="white"/>
      </svg>
      <span class="topbar-logo-name">智服工坊</span>
      <span class="topbar-logo-sub">CCO Skill Studio</span>
    </div>

    <div class="global-tab-group">
      <button class="global-tab active" data-mode="work">Work</button>
      <button class="global-tab" data-mode="market">Market</button>
    </div>

    <div class="global-topbar-right">
      <div class="topbar-avatar">L</div>
    </div>
  </header>

  <!-- 移动端遮罩 -->
  <div class="mobile-backdrop" id="mobileBackdrop"></div>

  <!-- 共享侧边栏（Work/Market 共用，内容动态替换） -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <svg width="18" height="18" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="10" cy="10" r="9" stroke="white" stroke-width="1.6" fill="none" opacity="0.7"/>
          <path d="M11.5 2.5L7 10.5H10.5L8.5 17.5L14 9H10.5L11.5 2.5Z" fill="white"/>
        </svg>
      </div>
      <span class="sidebar-title" id="sidebarTitle">Work 空间</span>
    </div>

    <nav class="sidebar-nav" id="sidebarNav"></nav>

    <div class="sidebar-footer">
      <button class="sidebar-collapse-btn" id="sidebarToggle">
        <span class="nav-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M10 3L6 8L10 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="collapse-label">收起侧边栏</span>
      </button>
    </div>
  </aside>

  <!-- Work 模式主内容区 -->
  <main class="main-content" id="modeWork">
    <div id="sec-skill"        class="page active"></div>
    <div id="sec-persona"      class="page"></div>
    <div id="sec-ops"          class="page"></div>
    <div id="sec-mcp"          class="page"></div>
    <div id="sec-skill-detail" class="page"></div>
  </main>

  <!-- Market 模式主内容区 -->
  <main class="main-content" id="modeMarket" style="display:none">
    <div id="sec-market" class="page active">
      <div id="mkt-square" class="mkt-view active"></div>
      <div id="mkt-publish" class="mkt-view"></div>
      <div id="mkt-mine" class="mkt-view"></div>
    </div>
  </main>

  <!-- 全局 Modal -->
  <div class="modal-overlay" id="appModal">
    <div class="modal" id="appModalInner"></div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script type="module" src="js/app.js?v=7"></script>
</body>
</html>
